name: Release activities

on:
  release:
    types:
      - published

jobs:
  deploy_backend_to_docker_repo:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push multi-platform backend image
        uses: docker/build-push-action@v5
        with:
          context: ./skyegpt-backend
          file: ./skyegpt-backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            rplesz/time-trace:latest
            rplesz/time-trace:${{ github.event.release.tag_name }}
  
